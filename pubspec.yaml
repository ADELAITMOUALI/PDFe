name: pdfe
description: "Blazing-fast PDF rendering. Zero bloat. Full fidelity."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # PDF (pdfrx is modern and stable for desktop)
  pdfrx: ^1.2.0
  # File picking & sharing
  file_picker: ^8.0.0
  share_plus: ^10.0.0
  receive_sharing_intent: ^1.8.1
  # Storage & permissions
  path_provider: ^2.1.2
  permission_handler: ^11.3.1
  shared_preferences: ^2.2.3
  # File opening from other apps
  open_filex: ^4.3.4
  # URL
  url_launcher: ^6.2.5
  # Utils
  intl: ^0.19.0
  path: ^1.9.0
  device_info_plus: ^11.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/logo.png"
  min_sdk_android: 21
  # adaptive_icon_background: "#FFFFFF"
  adaptive_icon_background: "assets/icons/logo.png"
  adaptive_icon_foreground: "assets/icons/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
